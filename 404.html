    .actions { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin-top:36px; }
    a.btn { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:0.95rem; letter-spacing:0.14em; text-transform:uppercase; padding:14px 26px; text-decoration:none; clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%); }
    a.primary { background:#e8002d; color:#fff; }
    a.primary:hover { background:#ff1f3d; }
    a.ghost { border:1px solid rgba(255,255,255,0.14); color:#fff; }
    a.ghost:hover { border-color:#e8002d; color:#e8002d; }
    .flag { display:inline-grid; grid-template-columns:repeat(4,8px); grid-template-rows:repeat(2,8px); gap:1px; margin-bottom:14px; }
    .flag div { background:#fff; }
    .flag div:nth-child(odd) { background:#0a0a0f; border:1px solid #fff; }
